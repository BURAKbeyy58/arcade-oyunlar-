<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2 Oyuncu - Siber Altın Avcısı</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030308;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #ui {
            width: 550px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 25px;
            border-radius: 15px;
            border: 2px solid #ffd32c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .score-box { font-size: 18px; font-weight: bold; }
        #timerBox { font-size: 24px; font-weight: bold; color: #ff3f34; background: rgba(255,63,52,0.1); padding: 5px 15px; border-radius: 10px; }
        #gameCanvas {
            border: 3px solid #ffd32c;
            background-color: #0c0c18;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 211, 44, 0.2);
        }
        #restartBtn {
            display: none;
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd32c, #ff9f43);
            color: #030308;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 211, 44, 0.4);
        }
        #restartBtn:hover { transform: scale(1.05); }
        #info { margin-top: 10px; color: #555; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-box" style="color: #2ed573;">P1 (YEŞİL): <span id="p1Score">0</span></div>
        <div id="timerBox">SÜRE: <span id="timeLeft">60</span></div>
        <div class="score-box" style="color: #00d2d3;">P2 (MAVİ): <span id="p2Score">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <button id="restartBtn" onclick="resetGame()">Yeniden Başla</button>
    <div id="info">
        <b>P1 (Yeşil):</b> A - D tuşları ile yarışır | <b>P2 (Mavi):</b> SAĞ - SOL Yön tuşları ile yarışır
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const restartBtn = document.getElementById("restartBtn");
        const p1ScoreElement = document.getElementById("p1Score");
        const p2ScoreElement = document.getElementById("p2Score");
        const timeLeftElement = document.getElementById("timeLeft");

        let p1Score = 0;
        let p2Score = 0;
        let timeLeft = 60;
        let isGameOver = false;
        let gameInterval;
        let countdownInterval;

        let keys = {};
        window.addEventListener("keydown", (e) => { keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        // Sepetler (Oyuncular)
        let p1 = { x: 150, y: 360, w: 65, h: 15, color: "#2ed573", speed: 6 };
        let p2 = { x: 380, y: 360, w: 65, h: 15, color: "#00d2d3", speed: 6 };

        // Düşen Altınlar
        let goldItems = [];
        let goldTimer = 0;

        function update() {
            if (isGameOver) return;

            // P1 Hareket (A-D)
            if (keys["KeyA"] && p1.x > 0) p1.x -= p1.speed;
            if (keys["KeyD"] && p1.x < canvas.width - p1.w) p1.x += p1.speed;

            // P2 Hareket (Yön Tuşları)
            if (keys["ArrowLeft"] && p2.x > 0) p2.x -= p2.speed;
            if (keys["ArrowRight"] && p2.x < canvas.width - p2.w) p2.x += p2.speed;

            // Rastgele Altın/Elmas Üretimi
            goldTimer++;
            if (goldTimer % 35 === 0) {
                let randType = Math.random();
                let type = "gold";
                let size = Math.floor(Math.random() * 15) + 12; // Rastgele boyutlar
                let color = "#ffd32c"; // Normal Altın
                let points = 10;

                if (randType > 0.85) {
                    type = "diamond";
                    size = 10;
                    color = "#ff4757"; // Değerli Kırmızı Elmas
                    points = 30;
                } else if (randType < 0.2) {
                    type = "rock";
                    size = 22;
                    color = "#57606f"; // Puan Düşüren Taş
                    points = -15;
                }

                goldItems.push({
                    x: Math.random() * (canvas.width - size),
                    y: -size,
                    size: size,
                    type: type,
                    color: color,
                    points: points,
                    speed: (Math.random() * 2) + 2.5 // Rastgele düşme hızları
                });
            }

            // Altınları Yürüt ve Yakalama Kontrolü
            for (let i = goldItems.length - 1; i >= 0; i--) {
                goldItems[i].y += goldItems[i].speed;

                // Ekrandan çıkarsa sil
                if (goldItems[i].y > canvas.height) {
                    goldItems.splice(i, 1);
                    continue;
                }

                // P1 Yakaladı mı?
                if (checkBasketCollision(goldItems[i], p1)) {
                    p1Score += goldItems[i].points;
                    if (p1Score < 0) p1Score = 0;
                    p1ScoreElement.innerText = p1Score;
                    goldItems.splice(i, 1);
                    continue;
                }

                // P2 Yakaladı mı?
                if (checkBasketCollision(goldItems[i], p2)) {
                    p2Score += goldItems[i].points;
                    if (p2Score < 0) p2Score = 0;
                    p2ScoreElement.innerText = p2Score;
                    goldItems.splice(i, 1);
                    continue;
                }
            }
        }

        function checkBasketCollision(item, basket) {
            return (
                item.x + item.size > basket.x &&
                item.x < basket.x + basket.w &&
                item.y + item.size > basket.y &&
                item.y < basket.y + basket.h
            );
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // P1 Sepet Çizimi
            ctx.shadowBlur = 12;
            ctx.shadowColor = p1.color;
            ctx.fillStyle = p1.color;
            ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
            ctx.fillRect(p1.x + 5, p1.y + p1.h, p1.w - 10, 5); // Sepet derinliği efekti

            // P2 Sepet Çizimi
            ctx.shadowColor = p2.color;
            ctx.fillStyle = p2.color;
            ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
            ctx.fillRect(p2.x + 5, p2.y + p2.h, p2.w - 10, 5);

            // Düşen Madenleri Çiz
            for (let item of goldItems) {
                ctx.shadowColor = item.color;
                ctx.fillStyle = item.color;
                if (item.type === "diamond") {
                    // Baklava şekli elmas çizimi
                    ctx.beginPath();
                    ctx.moveTo(item.x + item.size/2, item.y);
                    ctx.lineTo(item.x + item.size, item.y + item.size/2);
                    ctx.lineTo(item.x + item.size/2, item.y + item.size);
                    ctx.lineTo(item.x, item.y + item.size/2);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // Altın veya Taş için kare/yuvarlak neon hatlar
                    ctx.fillRect(item.x, item.y, item.size, item.size);
                }
            }

            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
        }

        function startTimer() {
            countdownInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    timeLeftElement.innerText = timeLeft;
                } else {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval);
            clearInterval(countdownInterval);
            restartBtn.style.display = "block";

            ctx.fillStyle = "rgba(3, 3, 8, 0.96)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ffd32c";
            ctx.font = "bold 42px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("HARİKASIN!", canvas.width / 2, canvas.height / 2 - 20);

            let winnerText = "";
            if (p1Score > p2Score) {
                winnerText = "KAZANAN: OYUNCU 1 (YEŞİL)";
                ctx.fillStyle = "#2ed573";
            } else if (p2Score > p1Score) {
                winnerText = "KAZANAN: OYUNCU 2 (MAVİ)";
                ctx.fillStyle = "#00d2d3";
            } else {
                winnerText = "DOSTLUK KAZANDI! BERABERE";
                ctx.fillStyle = "#ffffff";
            }

            ctx.font = "bold 20px sans-serif";
            ctx.fillText(winnerText, canvas.width / 2, canvas.height / 2 + 25);
            ctx.fillStyle = "#888";
            ctx.font = "16px sans-serif";
            ctx.fillText("P1 Skor: " + p1Score + " | P2 Skor: " + p2Score, canvas.width / 2, canvas.height / 2 + 55);
        }

        function resetGame() {
            p1Score = 0;
            p2Score = 0;
            timeLeft = 60;
            isGameOver = false;
            goldTimer = 0;
            goldItems = [];
            
            p1.x = 150;
            p2.x = 380;

            p1ScoreElement.innerText = "0";
            p2ScoreElement.innerText = "0";
            timeLeftElement.innerText = "60";
            restartBtn.style.display = "none";

            clearInterval(gameInterval);
            clearInterval(countdownInterval);
            
            gameInterval = setInterval(gameLoop, 1000 / 60);
            startTimer();
        }

        resetGame();
    </script>
</body>
</html>
