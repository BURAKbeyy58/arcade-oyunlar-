<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Uçan Küp - Engellerden Kaçış</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c1020;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #ui {
            margin-bottom: 15px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 25px;
            border-radius: 20px;
            border: 1px solid #252850;
            display: flex;
            gap: 20px;
        }
        .stat-box { font-weight: bold; }
        #gameCanvas {
            border: 3px solid #ff007f;
            background-color: #050714;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.2);
        }
        #restartBtn {
            display: none;
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff007f, #ff007f);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
            transition: 0.2s;
        }
        #restartBtn:hover { transform: scale(1.05); }
        #info { margin-top: 10px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat-box" style="color: #ff007f;">Skor: <span id="score">0</span></div>
        <div class="stat-box" style="color: #00f0ff;">🏆 Rekor: <span id="highScore">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    
    <button id="restartBtn" onclick="resetGame()">Yeniden Başla</button>
    <div id="info">Zıplamak için <b>BOŞLUK (SPACE)</b> tuşuna bas!</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const restartBtn = document.getElementById("restartBtn");

        let score = 0;
        let isGameOver = false;
        let gameInterval;

        let birdHighScore = localStorage.getItem("kus_rekordu") ? parseInt(localStorage.getItem("kus_rekordu")) : 0;
        highScoreElement.innerText = birdHighScore;

        // --- Oyuncu (Uçan Pembe Küp) ---
        let bird = {
            x: 50,
            y: 200,
            size: 20,
            gravity: 0.4,   // Yer çekimi hızı
            velocity: 0,    // Düşme hızı
            jump: -6,       // Zıplama gücü
            color: "#ff007f"
        };

        // --- Borular (Engeller) ---
        let pipes = [];
        let pipeWidth = 50;
        let pipeGap = 130; // Boruların arasındaki geçiş boşluğu
        let pipeTimer = 0;

        // Boşluk tuşuna basınca zıpla
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && !isGameOver) {
                bird.velocity = bird.jump;
            }
        });

        function update() {
            if (isGameOver) return;

            // Kuşu yer çekimiyle aşağı düşür
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Tavan veya taban kontrolü (Yere çakılırsa ölür)
            if (bird.y + bird.size > canvas.height || bird.y < 0) {
                gameOver();
            }

            // Her 120 karede bir yeni boru çifti üret
            pipeTimer++;
            if (pipeTimer % 120 === 0) {
                let topPipeHeight = Math.random() * (canvas.height - pipeGap - 100) + 50;
                pipes.push({
                    x: canvas.width,
                    topHeight: topPipeHeight,
                    passed: false
                });
            }

            // Boruları hareket ettir
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 2; // Boruların sola kayma hızı

                // Skoru arttır (Boruyu başarıyla geçtiyse)
                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    score++;
                    scoreElement.innerText = score;
                    pipes[i].passed = true;
                }

                // --- Çarpışma Testi ---
                // Üst boruya çarptı mı?
                if (bird.x + bird.size > pipes[i].x && bird.x < pipes[i].x + pipeWidth) {
                    if (bird.y < pipes[i].topHeight || bird.y + bird.size > pipes[i].topHeight + pipeGap) {
                        gameOver();
                    }
                }

                // Ekrandan çıkan boruları temizle
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Boruları çiz (Yeşil siber borular)
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00ff66";
            ctx.fillStyle = "#00ff66";
            for (let pipe of pipes) {
                // Üst Boru
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                // Alt Boru
                ctx.fillRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, canvas.height - (pipe.topHeight + pipeGap));
            }

            // Uçan küpü çiz
            ctx.shadowColor = bird.color;
            ctx.fillStyle = bird.color;
            ctx.fillRect(bird.x, bird.y, bird.size, bird.size);

            ctx.shadowBlur = 0; // Efekti temizle
        }

        function gameLoop() {
            update();
            draw();
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval);
            restartBtn.style.display = "block";

            if (score > birdHighScore) {
                birdHighScore = score;
                highScoreElement.innerText = birdHighScore;
                localStorage.setItem("kus_rekordu", birdHighScore);
            }

            ctx.fillStyle = "rgba(5, 7, 20, 0.9)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f";
            ctx.font = "bold 32px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("KANADIN KIRILDI!", canvas.width / 2, canvas.height / 2 - 15);
            ctx.fillStyle = "#ffffff";
            ctx.font = "18px sans-serif";
            ctx.fillText("Geçilen Engel: " + score, canvas.width / 2, canvas.height / 2 + 20);
        }

        function resetGame() {
            score = 0;
            isGameOver = false;
            pipes = [];
            bird.y = 200;
            bird.velocity = 0;
            pipeTimer = 0;
            scoreElement.innerText = score;
            restartBtn.style.display = "none";
            gameInterval = setInterval(gameLoop, 1000 / 60);
        }

        resetGame();
    </script>
</body>
</html>
