<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Uzay Gemisi - Meteordan Kaçış</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05050a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #ui {
            margin-bottom: 15px;
            font-size: 18px;
            background: rgba(15, 15, 25, 0.8);
            padding: 10px 25px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0, 225, 255, 0.2);
            border: 1px solid #1e272e;
            display: flex;
            gap: 20px;
        }
        .stat-box { font-weight: bold; }
        #gameCanvas {
            border: 3px solid #00d2d3;
            background-color: #0a0a14;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        #restartBtn {
            display: none;
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d2d3, #00a8ff);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 210, 211, 0.4);
            transition: 0.2s;
        }
        #restartBtn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat-box" style="color: #00d2d3;">Skor (Zaman): <span id="score">0</span></div>
        <div class="stat-box" style="color: #ff4757;">🏆 En Yüksek: <span id="highScore">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    
    <button id="restartBtn" onclick="resetGame()">Yeniden Başla</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const restartBtn = document.getElementById("restartBtn");

        let score = 0;
        let isGameOver = false;
        let gameLoopInterval;
        let scoreInterval;

        // Hafızadan uzay rekorunu al
        let spaceHighScore = localStorage.getItem("uzay_rekordu") ? parseInt(localStorage.getItem("uzay_rekordu")) : 0;
        highScoreElement.innerText = spaceHighScore;

        // --- Uzay Gemisi (Oyuncu) ---
        let player = {
            x: 180,
            y: 440,
            width: 40,
            height: 20,
            speed: 15,
            color: "#00d2d3"
        };

        // --- Meteorlar (Düşmanlar) ---
        let enemies = [];
        let enemySpawnTimer = 0;

        // Klavye Kontrolü
        let keys = {};
        window.addEventListener("keydown", (e) => { keys[e.key] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key] = false; });

        function update() {
            if (isGameOver) return;

            // Gemiyi hareket ettir (Sadece Sağ-Sol)
            if (keys["ArrowLeft"] && player.x > 0) { player.x -= player.speed; }
            if (keys["ArrowRight"] && player.x < canvas.width - player.width) { player.x += player.speed; }

            // Belirli aralıklarla yeni meteor oluştur
            enemySpawnTimer++;
            if (enemySpawnTimer % 20 === 0) {
                enemies.push({
                    x: Math.random() * (canvas.width - 20),
                    y: -20,
                    size: 15 + Math.random() * 15,
                    speed: 3 + Math.random() * 5
                });
            }

            // Meteorları hareket ettir ve çarpışma kontrolü yap
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;

                // Ekrandan çıkan meteorları sil
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    continue;
                }

                // Çarpışma Testi (Gemi meteora değdi mi?)
                if (
                    player.x < enemies[i].x + enemies[i].size &&
                    player.x + player.width > enemies[i].x &&
                    player.y < enemies[i].y + enemies[i].size &&
                    player.y + player.height > enemies[i].y
                ) {
                    gameOver();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Uzay gemisini çiz (Neon efektli)
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Meteorları çiz
            ctx.shadowColor = "#ff4757";
            ctx.fillStyle = "#ff4757";
            for (let enemy of enemies) {
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
            }

            ctx.shadowBlur = 0; // Efekti sıfırla
        }

        function gameLoop() {
            update();
            draw();
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoopInterval);
            clearInterval(scoreInterval);
            restartBtn.style.with = "block";
            restartBtn.style.display = "block";

            // Rekor kontrolü
            if (score > spaceHighScore) {
                spaceHighScore = score;
                highScoreElement.innerText = spaceHighScore;
                localStorage.setItem("uzay_rekordu", spaceHighScore);
            }

            // Ekranı karart ve yazıları yaz
            ctx.fillStyle = "rgba(5, 5, 10, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff4757";
            ctx.font = "bold 32px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("GEMİ PARÇALANDI!", canvas.width / 2, canvas.height / 2 - 15);
            ctx.fillStyle = "#ffffff";
            ctx.font = "18px sans-serif";
            ctx.fillText("Hayatta Kalma Skoru: " + score, canvas.width / 2, canvas.height / 2 + 20);
        }

        function resetGame() {
            score = 0;
            isGameOver = false;
            enemies = [];
            player.x = 180;
            scoreElement.innerText = score;
            restartBtn.style.display = "none";
            
            // Döngüleri yeniden başlat
            gameLoopInterval = setInterval(gameLoop, 1000 / 60); // 60 FPS
            scoreInterval = setInterval(() => {
                if (!isGameOver) {
                    score++;
                    scoreElement.innerText = score;
                }
            }, 500); // Yarım saniyede bir puan gelsin
        }

        // Oyunu ilk kez başlat
        resetGame();
    </script>
</body>
</html>
