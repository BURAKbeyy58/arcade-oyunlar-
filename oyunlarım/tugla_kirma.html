<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Siber Tuğla Kırma Oyunu - Gerçek Rastgele Açılı</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #080810;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            border: 3px solid #ff9f43;
            background-color: #0d0d1a;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 159, 67, 0.2);
        }
        #restartBtn {
            display: none;
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff9f43, #ff5252);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 159, 67, 0.4);
            transition: 0.2s;
        }
        #restartBtn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="420"></canvas>
    
    <button id="restartBtn" onclick="resetGame()">Yeniden Başla</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const restartBtn = document.getElementById("restartBtn");

        let score = 0;
        let isGameOver = false;
        let gameInterval;

        let brickHighScore = localStorage.getItem("tugla_rekordu") ? parseInt(localStorage.getItem("tugla_rekordu")) : 0;

        let ball = {
            x: 200,
            y: 320,
            radius: 7,
            dx: 0,
            dy: 0,
            color: "#ffffff"
        };

        let paddle = {
            height: 12,
            width: 75,
            x: 162,
            speed: 7,
            color: "#1dd1a1"
        };

        let brickRowCount = 3;
        let brickColumnCount = 5;
        let brickWidth = 65;
        let brickHeight = 15;
        let brickPadding = 10;
        let brickOffsetTop = 70; 
        let brickOffsetLeft = 20;

        let bricks = [];
        function createBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        let rightPressed = false;
        let leftPressed = false;
        window.addEventListener("keydown", (e) => {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
            if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
        });
        window.addEventListener("keyup", (e) => {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
            if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
        });

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            score += 10;

                            if (score > brickHighScore) {
                                brickHighScore = score;
                                localStorage.setItem("tugla_rekordu", brickHighScore);
                            }

                            if (score === brickRowCount * brickColumnCount * 10) {
                                gameWin();
                            }
                        }
                    }
                }
            }
        }

        function update() {
            if (isGameOver) return;

            if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
            if (leftPressed && paddle.x > 0) paddle.x -= paddle.speed;

            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
                ball.dx = -ball.dx;
            }
            if (ball.y + ball.dy < ball.radius) {
                ball.dy = -ball.dy;
            } 
            else if (ball.y + ball.dy > canvas.height - ball.radius) {
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    // Çubuğun neresine çarptığına göre açıyı hafifçe değiştiriyoruz (Daha gerçekçi)
                    let collidePoint = ball.x - (paddle.x + paddle.width / 2);
                    collidePoint = collidePoint / (paddle.width / 2);
                    ball.dx = collidePoint * 4;
                    ball.dy = -ball.dy;
                } else {
                    gameOver();
                }
            }

            collisionDetection();
        }

        function drawScore() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ffa502";
            ctx.fillStyle = "#ffa502";
            ctx.font = "bold 18px 'Segoe UI', sans-serif";
            ctx.textAlign = "left";
            ctx.fillText("SKOR: " + score, 20, 40);
            
            ctx.shadowColor = "#00d2d3";
            ctx.fillStyle = "#00d2d3";
            ctx.textAlign = "right";
            ctx.fillText("🏆 REKOR: " + brickHighScore, canvas.width - 20, 40);
            ctx.shadowBlur = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawScore();

            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = "#ff9f43";
                        ctx.fillStyle = "#ff9f43";
                        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
                    }
                }
            }

            ctx.shadowBlur = 8;
            ctx.shadowColor = paddle.color;
            ctx.fillStyle = paddle.color;
            ctx.fillRect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height);

            ctx.shadowColor = ball.color;
            ctx.fillStyle = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();

            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval);
            restartBtn.style.display = "block";

            ctx.fillStyle = "rgba(8, 8, 16, 0.9)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff5252";
            ctx.font = "bold 32px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("TOPU KAÇIRDIN!", canvas.width / 2, canvas.height / 2 - 15);
        }

        function gameWin() {
            isGameOver = true;
            clearInterval(gameInterval);
            restartBtn.style.display = "block";

            ctx.fillStyle = "rgba(8, 8, 16, 0.9)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#1dd1a1";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("HARİKASIN!", canvas.width / 2, canvas.height / 2 - 15);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "18px sans-serif";
            ctx.fillText("Tüm tuğlaları yok ettin!", canvas.width / 2, canvas.height / 2 + 25);
        }

        function resetGame() {
            score = 0;
            isGameOver = false;
            paddle.x = 162;
            ball.x = 200;
            ball.y = 320;
            
            // --- GERÇEK RASTGELE ÇAPRAZ AÇI AYARI ---
            // Geniş bir açıyla fırlaması için rastgele bir radyan seçiyoruz
            let angle = (Math.random() * (Math.PI / 3)) + (Math.PI / 3); // 60 ile 120 derece arası
            ball.dx = Math.cos(angle) * 4; // Yatay hız
            ball.dy = -Math.sin(angle) * 4; // Yukarı dikey hız (Kesin yukarı fırlasın)
            
            // Eğer top çok dik gidiyorsa biraz eğim verelim
            if(Math.abs(ball.dx) < 1) {
                ball.dx = ball.dx < 0 ? -2 : 2;
            }

            restartBtn.style.display = "none";
            createBricks();
            gameInterval = setInterval(gameLoop, 1000 / 60);
        }

        createBricks();
        resetGame();
    </script>
</body>
</html>
