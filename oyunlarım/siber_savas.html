<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>10. Oyun - Siber Savaş Gemisi</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #fff; background: #1a1a1a; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="500" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let ship = { x: 230, y: 350, w: 40, h: 20 };
        let items = [{ x: 250, y: 0, speed: 3 }];
        let score = 0;

        function update() {
            // Öğe hareketi
            items.forEach(i => {
                i.y += i.speed;
                // Yakalama
                if (i.y > ship.y && i.x > ship.x && i.x < ship.x + ship.w) {
                    i.y = 0; i.x = Math.random() * 480; score += 10;
                }
                // Kaçırma
                if (i.y > 400) { i.y = 0; i.x = Math.random() * 480; score -= 5; }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, 500, 400);
            ctx.fillStyle = "#00f0ff";
            ctx.fillRect(ship.x, ship.y, ship.w, ship.h); // Gemi
            ctx.fillStyle = "#ff4757";
            items.forEach(i => ctx.fillRect(i.x, i.y, 10, 10)); // Enerji
            ctx.fillStyle = "white";
            ctx.fillText("SKOR: " + score, 10, 20);
            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener("keydown", e => {
            if(e.code == "ArrowLeft" && ship.x > 0) ship.x -= 30;
            if(e.code == "ArrowRight" && ship.x < 460) ship.x += 30;
        });

        draw();
    </script>
</body>
</html>
